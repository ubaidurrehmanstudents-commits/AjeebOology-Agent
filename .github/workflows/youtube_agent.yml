name: 🎬 Ajeebology Shorts — Premium Video Pipeline

on:
  schedule:
    - cron: '45 8 * * *'          # 8:45 AM UTC = 1:45 PM PKT
  workflow_dispatch:               # Manual trigger
    inputs:
      debug_mode:
        description: 'Keep all temp files for debugging'
        type: boolean
        default: false

env:
  GROQ_API_KEY:       ${{ secrets.GROQ_API_KEY }}
  TAVILY_API_KEY:     ${{ secrets.TAVILY_API_KEY }}
  PEXELS_API_KEY:     ${{ secrets.PEXELS_API_KEY }}
  TELEGRAM_TOKEN:     ${{ secrets.TELEGRAM_TOKEN }}
  TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
  PYTHONUNBUFFERED:   1

jobs:
  build:
    name: Generate YouTube Short
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Check out the repository ──
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Python (NO cache — needs requirements.txt) ──
      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── 3. Install system dependencies ──
      - name: 🔧 Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            ffmpeg \
            fonts-dejavu-core \
            libass-dev \
            --no-install-recommends
          echo "FFmpeg: $(ffmpeg -version 2>&1 | head -1)"

      # ── 4. Install Python dependencies ──
      - name: 📦 Install Python deps
        run: |
          python -m pip install --upgrade pip --quiet
          pip install edge-tts requests --quiet

      # ── 5. Verify toolchain ──
      - name: ✅ Verify setup
        run: |
          python3 -c "import edge_tts; print('✓ edge-tts OK')"
          python3 -c "import requests; print('✓ requests OK')"
          ffmpeg -f lavfi -i "color=c=black:s=1x1:d=0.1" \
            -f null - 2>&1 && echo "✓ ffmpeg OK"

      # ── 6. Run pipeline ──
      - name: 🎬 Run video pipeline
        run: python3 youtube_agent.py

      # ── 7. Upload artifacts ──
      - name: 📤 Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ajeebology-output
          path: |
            /tmp/ajeebology_output/output_video.mp4
            /tmp/ajeebology_output/metadata.json
            /tmp/ajeebology_output/pipeline.log
          if-no-files-found: warn
          retention-days: 3
          compression-level: 0

      # ── 8. Debug artifacts on failure ──
      - name: 🔍 Upload debug artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ajeebology-debug
          path: /tmp/ajeebology_output/
          if-no-files-found: warn
          retention-days: 1

      # ── 9. Notify on failure ──
      - name: ❌ Failure notification
        if: failure()
        run: |
          MSG="❌ *Pipeline Failed* — Ajeebology Shorts%0A%0A🔍 ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=$MSG" \
            -d "parse_mode=Markdown" --max-time 10 || true
