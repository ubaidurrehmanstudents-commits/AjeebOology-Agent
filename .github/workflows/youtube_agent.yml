name: Ajeebology Shorts Pipeline

on:
  schedule:
    # Runs automatically every day at 12:00 PM UTC
    - cron: '0 12 * * *' 
  workflow_dispatch: # Allows you to trigger it manually via GitHub UI

env:
  # Required as per error prevention checklist
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  generate_short:
    runs-on: ubuntu-latest
    timeout-minutes: 15 # Safeguard to prevent eating up free tier minutes

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Cache Assets Directory
        uses: actions/cache@v4
        with:
          path: assets/
          key: ${{ runner.os }}-assets-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-assets-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          # Deliberately omitting the cache line here as requested

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libavcodec-extra libfontconfig1 fonts-dejavu-core fonts-noto-cjk espeak sox libsox-fmt-all

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install groq tavily-python requests pillow python-telegram-bot pydub numpy tenacity gTTS

      - name: Execute YouTube Agent
        env:
          # Injecting all required secrets into the execution environment
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python youtube_agent.py

      - name: Upload Output Artifacts
        uses: actions/upload-artifact@v4
        if: always() # Uploads even if the script fails so you can debug
        with:
          name: Ajeebology_Output
          path: output/
          retention-days: 7
          
