name: Ajeebology Shorts — Automated Production Pipeline

on:
  workflow_dispatch:
    inputs:
      topic:
        description: 'Video topic category'
        required: true
        default: 'random'
        type: choice
        options:
          - psychology
          - space
          - weird_world
          - random
      force_regenerate:
        description: 'Force regenerate even if cache exists'
        required: false
        default: false
        type: boolean

  schedule:
    - cron: '0 8 * * *'
    - cron: '0 20 * * *'

env:
  PYTHONUNBUFFERED: "1"
  FORCE_COLOR: "1"
  GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
  TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
  PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
  UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
  TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

permissions:
  contents: read
  actions: write

jobs:
  produce_short:
    name: Produce YouTube Short
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'requirements.txt'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg ffprobe fonts-noto-color-emoji fonts-noto-cjk fonts-dejavu-core imagemagick libmagickwand-dev sox libsox-fmt-mp3 curl jq 2>&1 | tail -n 5
          ffmpeg -version | head -n 1
          ffprobe -version | head -n 1

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip setuptools wheel -q
          pip install -r requirements.txt -q 2>&1 | tail -n 3

      - name: Pre-flight API checks
        run: python youtube_agent.py --mode preflight

      - name: Run production pipeline
        id: pipeline
        run: |
          mkdir -p output
          python youtube_agent.py \
            --topic "${{ github.event.inputs.topic || 'random' }}" \
            --output-dir ./output \
            --force "${{ github.event.inputs.force_regenerate || false }}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ajeebology-short-${{ github.run_number }}-${{ github.run_attempt }}
          path: |
            output/*.mp4
            output/*.jpg
            output/*.png
            output/*.json
            output/*.txt
            output/*.log
          retention-days: 7
          if-no-files-found: warn

      - name: Verify outputs
        run: |
          test -f output/video.mp4 || { echo "::error::Video file not produced!"; exit 1; }
          test -f output/thumbnail.jpg || test -f output/thumbnail.png || { echo "::error::Thumbnail not produced!"; exit 1; }
          ls -lh output/

      - name: Send to Telegram
        if: success()
        run: python youtube_agent.py --mode telegram --output-dir ./output

      - name: Cleanup workspace
        if: always()
        run: |
          rm -rf output/
          sudo apt-get clean
          pip cache purge 2>/dev/null || true
          
