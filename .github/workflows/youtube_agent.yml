name: 🎬 Ajeebology Shorts — Daily Video Pipeline

on:
  schedule:
    - cron: '45 8 * * *'   # 1:45 PM PKT
  workflow_dispatch:

env:
  GROQ_API_KEY:     ${{ secrets.GROQ_API_KEY }}
  TAVILY_API_KEY:   ${{ secrets.TAVILY_API_KEY }}
  PEXELS_API_KEY:   ${{ secrets.PEXELS_API_KEY }}
  TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
  PYTHONUNBUFFERED: 1

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 🔧 Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg fonts-dejavu-core --no-install-recommends

      - name: 📦 Install Python deps
        run: pip install edge-tts requests --quiet

      - name: ✅ Verify
        run: |
          python3 -c "import edge_tts; print('✓ edge-tts')"
          python3 -c "import requests; print('✓ requests')"
          ffmpeg -version > /dev/null 2>&1 && echo "✓ ffmpeg"

      - name: 🎬 Run pipeline
        run: python3 youtube_agent.py

      - name: 📤 Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ajeebology-output
          path: |
            /tmp/ajeebology_output/output_video.mp4
            /tmp/ajeebology_output/metadata.json
            /tmp/ajeebology_output/pipeline.log
          if-no-files-found: warn
          retention-days: 3

      - name: ❌ Failure notification
        if: failure()
        run: |
          MSG="❌ *Pipeline Failed* — Ajeebology Shorts%0A%0A🔍 ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=$MSG" \
            -d "parse_mode=Markdown" --max-time 10 || true
