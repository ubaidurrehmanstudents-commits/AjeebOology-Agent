name: YouTube Shorts Automation Agent

on:
  schedule:
    - cron: '30 9 * * *'  # Daily 2:30 PM PKT (9:30 AM UTC)
  workflow_dispatch:

jobs:
  build-and-generate:
    runs-on: ubuntu-latest
    timeout-minutes: 55

    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install System Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg fonts-dejavu-core
          ffmpeg -version | head -n 1
          echo "FFmpeg installed"

      - name: Install Python Libraries
        run: |
          pip install --upgrade pip --quiet
          pip install groq tavily-python gTTS Pillow requests edge-tts
          echo "Python libraries installed"

      - name: Run YouTube Agent Script
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          echo "Starting Ajeebology Shorts Agent..."
          python youtube_agent.py
          echo "Agent script completed"

      - name: Verify Output Files
        run: |
          if [ -f "output_video.mp4" ]; then
            SIZE=$(du -sh output_video.mp4 | cut -f1)
            echo "output_video.mp4 exists - Size: $SIZE"
          else
            echo "output_video.mp4 NOT found!"
            exit 1
          fi
          if [ -f "thumbnail.png" ]; then
            echo "thumbnail.png exists"
          else
            echo "thumbnail.png not found"
          fi

      - name: Upload Video Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: daily-shorts-video-${{ github.run_number }}
          path: |
            output_video.mp4
            thumbnail.png
          retention-days: 90
          if-no-files-found: warn
          
