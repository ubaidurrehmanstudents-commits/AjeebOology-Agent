name: Ajeebology Shorts Production

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.10'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: '**/requirements.txt'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg \
            libavcodec-extra \
            libfontconfig1 \
            libfreetype6-dev \
            fonts-dejavu-core \
            fonts-noto-cjk \
            fonts-noto-color-emoji \
            espeak
          ffmpeg -version
          espeak --version

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install \
            groq \
            tavily-python \
            pexels-api \
            requests \
            pillow \
            python-telegram-bot==20.7 \
            pydub \
            numpy \
            python-dotenv \
            tenacity \
            gtts

      - name: Restore cached media assets
        uses: actions/cache@v3
        id: media-cache
        with:
          path: ./assets_cache
          key: ${{ runner.os }}-media-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-media-

      - name: Run the Shorts production pipeline
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          CACHE_DIR: ./assets_cache
        run: |
          python youtube_agent.py

      - name: Upload generated video and metadata
        uses: actions/upload-artifact@v4
        with:
          name: shorts-output
          path: |
            output/*.mp4
            output/*.png
            output/*.json
          retention-days: 7

      - name: Save cache after run
        if: always()
        uses: actions/cache/save@v3
        with:
          path: ./assets_cache
          key: ${{ runner.os }}-media-${{ github.run_id }}
