name: Ajeebology Shorts Agent

on:
  workflow_dispatch:
    inputs:
      topic:
        description: "Optional topic override: psychology, space, or weird world facts"
        required: false
        default: ""
      style:
        description: "Optional style override"
        required: false
        default: "auto"
      force_regenerate:
        description: "Force regeneration even if recent outputs exist"
        required: false
        default: "false"
        type: boolean
  schedule:
    - cron: "0 7 * * *"
  push:
    branches:
      - main
    paths:
      - "youtube_agent.py"
      - ".github/workflows/youtube_agent.yml"

permissions:
  contents: read

concurrency:
  group: ajeebology-shorts-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-short:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      PYTHONUNBUFFERED: "1"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PIP_NO_CACHE_DIR: "0"
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
      PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
      UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      SHORTS_TOPIC: ${{ github.event.inputs.topic }}
      SHORTS_STYLE: ${{ github.event.inputs.style }}
      FORCE_REGENERATE: ${{ github.event.inputs.force_regenerate }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-dejavu-core fonts-liberation fonts-noto-core

      - name: Create working directories
        run: |
          mkdir -p output
          mkdir -p ~/.cache/pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pillow numpy moviepy google-generativeai

      - name: Validate secrets presence
        run: |
          python - <<'PY'
          import os, sys
          required = [
              "GROQ_API_KEY",
              "TAVILY_API_KEY",
              "PEXELS_API_KEY",
              "UNSPLASH_ACCESS_KEY",
              "TELEGRAM_TOKEN",
              "TELEGRAM_CHAT_ID",
          ]
          missing = [k for k in required if not os.getenv(k)]
          if missing:
              print("Missing secrets:", ", ".join(missing))
              sys.exit(1)
          print("All required secrets are present.")
          PY

      - name: Run Shorts pipeline
        run: |
          python youtube_agent.py

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ajeebology-shorts-${{ github.run_id }}
          path: |
            output/**
          if-no-files-found: warn
          retention-days: 7

      - name: Summarize run
        if: always()
        run: |
          echo "Workflow completed."
          echo "Check the uploaded artifact for the rendered video, thumbnail, metadata, sources, and runtime stats."
