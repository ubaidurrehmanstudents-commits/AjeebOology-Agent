name: Ajeebology Shorts - Daily Automation

on:
  schedule:
    # Runs at 1:00 PM PKT (08:00 UTC)
    - cron: '0 8 * * *'
  workflow_dispatch:
    inputs:
      category:
        description: 'Force a specific category (psychology/space/weird_facts)'
        required: false
        default: ''

env:
  PYTHONUNBUFFERED: "1"
  FORCE_COLOR: "1"

jobs:
  build-and-deliver:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Cache pip packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: pip-${{ hashFiles('requirements.txt') }}
        restore-keys: pip-

    - name: Cache downloaded assets (images, music)
      uses: actions/cache@v4
      with:
        path: /tmp/ajeebology/assets
        key: ajeebology-assets-v1
        restore-keys: ajeebology-assets-

    - name: Install system dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq --no-install-recommends \
          ffmpeg \
          libsm6 \
          libxext6 \
          libgl1 \
          libfontconfig1 \
          libxrender1 \
          fonts-dejavu-core \
          fonts-liberation \
          fonts-freefont-ttf \
          fonts-noto-core
        ffmpeg -version | head -1

    - name: Install Python dependencies
      run: |
        pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Ajeebology Pipeline
      env:
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        GITHUB_RUN_ID: ${{ github.run_id }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        CATEGORY_OVERRIDE: ${{ github.event.inputs.category }}
      run: |
        echo "Starting Ajeebology Shorts Pipeline..."
        python youtube_agent.py

    - name: Upload video artifact (for manual download)
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: ajeebology-video-${{ github.run_id }}
        path: |
          /tmp/ajeebology/output/output_video.mp4
          /tmp/ajeebology/output/thumbnail.jpg
        retention-days: 7
        if-no-files-found: warn

    - name: Cleanup temporary files
      if: always()
      run: |
        rm -rf /tmp/ajeebology/frames  # not used with MoviePy, but safe

    - name: Notify on failure
      if: failure()
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        curl -s -X POST \
          "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
          -d "chat_id=${TELEGRAM_CHAT_ID}" \
          -d "parse_mode=HTML" \
          -d "text=<b>❌ Ajeebology Pipeline Failed</b>%0A%0ARun ID: ${{ github.run_id }}%0ARepository: ${{ github.repository }}%0A%0A<a href='https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}'>View Logs</a>" \
          || true
