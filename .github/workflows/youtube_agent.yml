name: Ajeebology Shorts Pipeline

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:
    inputs:
      topic:
        description: 'Custom topic (empty = auto)'
        required: false
        type: string
        default: ''
      category:
        description: 'psychology | space | weird | auto'
        required: false
        type: string
        default: 'auto'
      dry_run:
        description: 'Skip Telegram delivery'
        required: false
        type: boolean
        default: false

concurrency:
  group: ajeebology-production
  cancel-in-progress: false

jobs:
  produce:
    timeout-minutes: 45
    runs-on: ubuntu-latest

    env:
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
      PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
      UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      TOPIC_OVERRIDE: ${{ inputs.topic || '' }}
      CATEGORY_OVERRIDE: ${{ inputs.category || 'auto' }}
      DRY_RUN: ${{ inputs.dry_run || false }}
      PYTHONUNBUFFERED: '1'
      LC_ALL: 'C.UTF-8'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('youtube_agent.py') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq --no-install-recommends ffmpeg imagemagick
          ffmpeg -version | head -1

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --quiet groq tavily-python edge-tts requests Pillow setuptools

      - name: Verify Python imports
        run: python -c "import groq; import tavily; import edge_tts; import requests; import PIL; print('All dependencies ready')"

      - name: Generate short video
        id: generator
        run: python youtube_agent.py
        shell: bash

      - name: Verify output
        id: verify
        run: |
          if [ ! -f "output/video.mp4" ]; then
            echo "::error::output/video.mp4 not found"
            exit 1
          fi
          SIZE=$(stat --printf="%s" output/video.mp4)
          DUR=$(ffprobe -v error -show_entries format=duration -of csv=p=0 output/video.mp4)
          echo "size=$SIZE" >> $GITHUB_OUTPUT
          echo "duration=$DUR" >> $GITHUB_OUTPUT
          echo "Video: ${SIZE} bytes, ${DUR}s"
          ls -lh output/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ajeebology-short
          path: |
            output/
            !output/**/*.tmp
          retention-days: 3
          overwrite: true

      - name: Failure notification
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="$(echo -e '\u274c') Ajeebology pipeline FAILED%0A%0A${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            -d parse_mode="Markdown" || true

      - name: Clean workspace
        if: always()
        run: rm -rf output temp __pycache__ || true
