name: 🎬 Ajeebology Shorts Pipeline

on:
  workflow_dispatch:
    inputs:
      topic:
        description: 'Topic category'
        required: false
        default: 'random'
        type: choice
        options:
          - random
          - psychology
          - space
          - weird_world
      count:
        description: 'Videos to generate'
        required: false
        default: '1'
        type: choice
        options:
          - '1'
          - '2'
          - '3'

  schedule:
    # Runs daily at 10:30 AM Pakistan Standard Time (UTC+5)
    - cron: '30 5 * * *'

env:
  PYTHON_VERSION: '3.11'

jobs:
  produce:
    name: Generate Shorts
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: ⚡ Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          # Use youtube_agent.py as cache key since no requirements.txt allowed
          cache-dependency-path: youtube_agent.py

      - name: 📦 Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            ffmpeg \
            imagemagick \
            fonts-noto \
            fonts-noto-color-emoji \
            fonts-indic
          mkdir -p output
          echo "✅ System deps installed"

      - name: 📦 Install Python dependencies
        run: |
          python -m pip install --upgrade pip wheel setuptools
          pip install \
            groq==1.5.0 \
            tavily-python==0.7.26 \
            pillow==10.4.0 \
            numpy==1.26.4 \
            requests==2.32.3 \
            edge-tts==7.2.8 \
            mutagen==1.47.0
          echo "✅ Python deps installed"

      - name: 🎬 Run Shorts Pipeline
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TOPIC: ${{ github.event.inputs.topic || 'random' }}
          VIDEO_COUNT: ${{ github.event.inputs.count || '1' }}
          RUN_ID: ${{ github.run_id }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
        run: python youtube_agent.py

      - name: 📤 Upload video artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: shorts-${{ github.run_id }}
          path: output/
          retention-days: 7
          if-no-files-found: warn
          compression-level: 0
