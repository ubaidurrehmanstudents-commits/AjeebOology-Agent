name: Ajeebology Shorts Generator

on:
  workflow_dispatch:
    inputs:
      topic:
        description: 'Psychology/Space/Weird fact topic'
        required: true
        type: string
        default: 'Psychology fact about decision making'
      duration:
        description: 'Target duration in seconds'
        required: false
        type: string
        default: '60'

concurrency:
  group: ajeebology-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHONUNBUFFERED: 1
  TARGET_WIDTH: 1080
  TARGET_HEIGHT: 1920
  TARGET_FPS: 30
  TARGET_DURATION: ${{ inputs.duration }}

jobs:
  generate-short:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install FFmpeg and fonts
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg fonts-liberation
          ffmpeg -version | head -n1

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip -q
          pip install groq tavily-python requests pillow python-dotenv -q

      - name: Run youtube_agent.py
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TOPIC: ${{ inputs.topic }}
          TARGET_DURATION: ${{ env.TARGET_DURATION }}
        run: |
          python youtube_agent.py

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ajeebology-output-${{ github.run_number }}
          path: output/
          retention-days: 7
          compression-level: 6

      - name: Cleanup temp
        if: always()
        run: rm -rf /tmp/ajeebology_* || true
