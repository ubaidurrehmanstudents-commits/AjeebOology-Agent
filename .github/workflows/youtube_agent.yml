name: Ajeebology Shorts - Daily Automation

on:
  schedule:
    # Runs daily at 6:00 AM UTC
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      category:
        description: 'Content category (leave blank for random)'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - psychology
          - space
          - weird_facts

jobs:
  build-and-deliver:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      # ── Checkout ─────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── System dependencies ───────────────────────────────────────────────
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            ffmpeg \
            fonts-dejavu-core \
            fonts-noto \
            fonts-noto-cjk \
            fonts-liberation \
            libgl1 \
            libglib2.0-0

      # ── Python setup ──────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── Cache pip ────────────────────────────────────────────────────────
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}-v2
          restore-keys: |
            ${{ runner.os }}-pip-

      # ── Python dependencies ───────────────────────────────────────────────
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            requests \
            pillow \
            numpy \
            tenacity \
            edge-tts

      # ── Verify tools ─────────────────────────────────────────────────────
      - name: Verify dependencies
        run: |
          ffmpeg -version | head -1
          ffprobe -version | head -1
          python -c "import edge_tts; print('edge-tts OK')"
          python -c "from PIL import Image; print('Pillow OK')"
          python -c "import numpy; print('numpy OK')"
          python -c "import requests; print('requests OK')"

      # ── Run Pipeline ─────────────────────────────────────────────────────
      - name: Run Ajeebology Pipeline
        env:
          GROQ_API_KEY:        ${{ secrets.GROQ_API_KEY }}
          TAVILY_API_KEY:      ${{ secrets.TAVILY_API_KEY }}
          PEXELS_API_KEY:      ${{ secrets.PEXELS_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          TELEGRAM_TOKEN:      ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_RUN_ID:       ${{ github.run_id }}
          CATEGORY_OVERRIDE:   ${{ github.event.inputs.category }}
        run: |
          python youtube_agent.py

      # ── Upload artifacts ─────────────────────────────────────────────────
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ajeebology-output-${{ github.run_id }}
          path: |
            /tmp/ajeebology/output/output_video.mp4
            /tmp/ajeebology/output/metadata.json
            /tmp/ajeebology/output/description.txt
            /tmp/ajeebology/output/karaoke.ass
          if-no-files-found: warn
          retention-days: 7
