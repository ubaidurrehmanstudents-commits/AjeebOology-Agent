name: 🎬 Ajeebology Shorts — Premium Video Pipeline

on:
  schedule:
    - cron: '45 8 * * *'
  workflow_dispatch:
    inputs:
      debug_mode:
        description: 'Keep all temp files for debugging'
        type: boolean
        default: false

env:
  GROQ_API_KEY:       ${{ secrets.GROQ_API_KEY }}
  TAVILY_API_KEY:     ${{ secrets.TAVILY_API_KEY }}
  PEXELS_API_KEY:     ${{ secrets.PEXELS_API_KEY }}
  TELEGRAM_TOKEN:     ${{ secrets.TELEGRAM_TOKEN }}
  TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
  PYTHONUNBUFFERED:   1

jobs:
  build:
    name: Generate YouTube Short
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 🔧 Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            ffmpeg fonts-dejavu-core libass-dev \
            --no-install-recommends

      - name: 📦 Install Python deps
        run: |
          python -m pip install --upgrade pip --quiet
          pip install edge-tts requests --quiet

      - name: ✅ Verify setup
        run: |
          python3 -c "import edge_tts; print('✓ edge-tts OK')"
          python3 -c "import requests; print('✓ requests OK')"
          ffmpeg -version > /dev/null 2>&1 && echo "✓ ffmpeg OK"

      - name: 🎬 Run video pipeline
        run: python3 youtube_agent.py

      - name: 📤 Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ajeebology-output
          path: |
            /tmp/ajeebology_output/output_video.mp4
            /tmp/ajeebology_output/metadata.json
            /tmp/ajeebology_output/pipeline.log
          if-no-files-found: warn
          retention-days: 3
          compression-level: 0

      - name: 🔍 Upload debug artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ajeebology-debug
          path: /tmp/ajeebology_output/
          if-no-files-found: warn
          retention-days: 1

      - name: ❌ Failure notification
        if: failure()
        run: |
          MSG="❌ *Pipeline Failed* — Ajeebology Shorts%0A%0A🔍 ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=$MSG" \
            -d "parse_mode=Markdown" --max-time 10 || true
