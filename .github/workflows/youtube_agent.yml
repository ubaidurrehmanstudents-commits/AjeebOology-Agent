name: 🤖 Ajeebologyshorts Pro - Daily AI Shorts

on:
  schedule:
    - cron: '0 11 * * *'        # Every day at 4:00 PM PKT
  workflow_dispatch:            # Manual run button

jobs:
  generate-pro-short:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 🔧 Install System Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg

      - name: 📦 Install Python Packages
        run: |
          pip install -q moviepy edge-tts requests python-dotenv groq Pillow

      - name: 🔐 Load GitHub Secrets
        run: |
          cat > .env << 'EOF'
          GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
          TAVILY_API_KEY=${{ secrets.TAVILY_API_KEY }}
          TELEGRAM_TOKEN=${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}
          PEXELS_API_KEY=${{ secrets.PEXELS_API_KEY || '' }}
          EOF

      - name: 🚀 Run Professional Shorts Generator
        run: python scripts/generate_short_pro.py

      - name: 📤 Upload Video Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ajeebologyshorts-pro-video
          path: output/videos/*.mp4
          retention-days: 30

      - name: 📱 Send Telegram Notification
        run: python scripts/send_telegram_notification.py

      - name: 🧹 Cleanup
        if: always()
        run: rm -f .env
