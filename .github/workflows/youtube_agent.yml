name: Ajeebology Shorts - Daily Automation

on:
  schedule:
    # 8:45 UTC = 1:45 PM PKT (UTC+5)
    # For 1:45 AM PKT, change to: '45 20 * * *'
    - cron: '45 8 * * *'
  workflow_dispatch:
    inputs:
      category:
        description: 'Force a specific category (psychology/space/weird_facts)'
        required: false
        default: ''

concurrency:
  group: ajeebology-pipeline
  cancel-in-progress: true

env:
  PYTHONUNBUFFERED: "1"
  FORCE_COLOR: "1"
  MPLBACKEND: "Agg"

jobs:
  build-and-deliver:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            ffmpeg \
            libsm6 \
            libxext6 \
            libgl1 \
            libfontconfig1 \
            libxrender1 \
            fonts-dejavu-core \
            fonts-liberation \
            fonts-freefont-ttf \
            fonts-noto-core
          ffmpeg -version | head -1

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            requests \
            Pillow \
            numpy \
            edge-tts
          python -c "import PIL; print('Pillow:', PIL.__version__)"
          python -c "import edge_tts; print('edge-tts OK')"

      - name: Cache downloaded assets
        uses: actions/cache@v4
        with:
          path: /tmp/ajeebology/assets
          # FIX: stable key (run_id was making cache never restore)
          key: ajeebology-assets-v1
          restore-keys: |
            ajeebology-assets-

      - name: Run Ajeebology Pipeline
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          CATEGORY_OVERRIDE: ${{ github.event.inputs.category }}
        run: |
          echo "Starting Ajeebology Shorts Pipeline..."
          echo "Run ID: $GITHUB_RUN_ID"
          mkdir -p output
          python youtube_agent.py
          if [ -f /tmp/ajeebology/output/output_video.mp4 ]; then
            cp /tmp/ajeebology/output/output_video.mp4 output/
            echo "Video copied to output/"
          fi
          if [ -f /tmp/ajeebology/output/thumbnail.jpg ]; then
            cp /tmp/ajeebology/output/thumbnail.jpg output/
            echo "Thumbnail copied to output/"
          fi
          ls -lh output/

      - name: Upload video artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ajeebology-video-${{ github.run_id }}
          path: |
            output/output_video.mp4
            output/thumbnail.jpg
          retention-days: 14
          if-no-files-found: error

      - name: Cleanup temporary files
        if: always()
        run: |
          echo "Cleaning up temporary files..."
          rm -rf /tmp/ajeebology/frames
          rm -rf /tmp/ajeebology/audio
          du -sh /tmp/ajeebology/ 2>/dev/null || true
          df -h

      - name: Notify on failure
        if: failure()
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          echo "Pipeline failed. Sending notification..."
          curl -s -X POST \
            "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d parse_mode="HTML" \
            --data-urlencode "text=<b>❌ Ajeebology Pipeline Failed</b>%0A%0ARun ID: ${{ github.run_id }}%0ARepository: ${{ github.repository }}%0A%0A<a href='https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}'>View Logs</a>" \
            || true
