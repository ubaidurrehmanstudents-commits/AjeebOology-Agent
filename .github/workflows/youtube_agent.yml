name: Ajeebology Shorts Automation

on:
  schedule:
    - cron: '45 8 * * *' # 8:45 AM UTC = 1:45 PM PKT
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  build-and-deliver:
    runs-on: ubuntu-latest
    timeout-minutes: 15 # Hard limit to protect free tier minutes

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Dependencies (FFmpeg & Fonts)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-noto fonts-noto-core fonts-noto-extra fonts-noto-ui-core fonts-dejavu-core

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install edge-tts requests groq tavily-python Pillow

      - name: Execute Automation Pipeline
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python youtube_agent.py

      - name: Upload Video Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ajeebology-short-${{ github.run_id }}
          path: |
            output_video.mp4
            thumbnail.jpg
            metadata.txt
          retention-days: 3
